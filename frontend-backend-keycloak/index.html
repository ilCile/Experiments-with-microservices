<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="./style.css">
  <title>Simple Web App</title>
</head>
<body>

<header>
  <h1>Simple Web App</h1>
</header>

<main>

  <div class="card">
    <h2>Autenticazione</h2>

    <button id="loginBtn">Login</button>
    <button id="logoutBtn" class="danger">Logout</button>

    <p id="status">Stato: non autenticato</p>
  </div>

  <div class="card">
    <h2>Area Utente</h2>
    <button id="userBtn">Carica dati utente</button>
  </div>

  <div class="card">
    <h2>Area Admin</h2>
    <button id="adminBtn">Carica dati admin</button>
  </div>

  <div class="card">
    <h2>Risposta API</h2>
    <pre id="output">Nessun dato</pre>
  </div>

</main>

<script type="module" src="./index.js"></script>

</body>
</html>
