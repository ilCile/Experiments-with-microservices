volumes:
  postgres_data:
    driver: local
  appDB:
    driver: local

services:
  postgres:
      image: postgres:15
      volumes:
        - postgres_data:/var/lib/postgresql/data
      environment:
        POSTGRES_DB: keycloak
        POSTGRES_USER: keycloak
        POSTGRES_PASSWORD: password
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Pa55w0rd
    command: start-dev
    ports:
      - 8080:8080
    depends_on:
      - postgres
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - 5001:5001
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: Simple-web-App
      KEYCLOAK_CLIENT_ID: Simple-web-app-Keycloak
      DB_URL: postgresql://appUser:appPw@application-DB:5432/appDB
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    ports:
      - 5002:5002
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: Simple-web-App
      KEYCLOAK_CLIENT_ID: Simple-web-app-Keycloak
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:3000
  application-DB:
      image: postgres:15
      volumes:
        - appDB:/var/lib/postgresql/data
      environment:
        POSTGRES_DB: appDB
        POSTGRES_USER: appUser
        POSTGRES_PASSWORD: appPw


       